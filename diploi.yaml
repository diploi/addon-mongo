diploiVersion: v1.0
type: addon
name: MongoDB
description: Official MongoDB addon for Diploi.

parameterGroups:
  - name: Connection
    identifier: mongo
    description: Connection configuration
    parameters:
      - name: Database_url
        identifier: DATABASE_URL
        defaultValue: mongodb://mongo.${DIPLOI_NAMESPACE}
        type: string

connectionStrings:
  - name: Connection URI
    value: mongodb://mongo.${DIPLOI_NAMESPACE}
    description: This connection URI is for components within the deployment and is inaccessible externally.

logs:
  - name: MongoDB Log
    type: log
    labelSelector: app=mongo

images:
  - identifier: mongo
    image: mongo:8.2.3-noble

storage:
  - identifier: mongo
    sizeMiB: 5120
